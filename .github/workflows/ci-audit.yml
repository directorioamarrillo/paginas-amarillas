name: CI - Audit Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          if [ -f server/requirements-extras.txt ]; then pip install -r server/requirements-extras.txt; fi

      - name: Run tests
        env:
          USER: test
          PASSWORD: test
          HOST: localhost
          DATABASE: testdb
          PYTHONPATH: ${{ github.workspace }}/server
        run: |
          cd server
          pytest -q
